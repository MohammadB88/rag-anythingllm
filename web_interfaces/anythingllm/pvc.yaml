---
# storageClassName is replaced by env_preparation/deploy_root_application.sh during deployment.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ai-assistant-pvc
spec:
  accessModes:
    - ReadWriteOnce
  volumeMode: Filesystem
  resources:
    requests:
      storage: 30Gi
  storageClassName: placeholder-storageclass