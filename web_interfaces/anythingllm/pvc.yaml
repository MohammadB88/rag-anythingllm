---
# STORAGE_CLASS_NAME is defined in kustomization.yaml and applied here.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ai-assistant-pvc
spec:
  accessModes:
    - ReadWriteOnce
  volumeMode: Filesystem
  resources:
    requests:
      storage: 30Gi
  storageClassName: $(STORAGE_CLASS_NAME)