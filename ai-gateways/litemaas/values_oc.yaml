# =============================================================================
# LiteMaaS Helm Values — OpenShift with ServiceAccount OAuth (default)
# =============================================================================
# The simplest OpenShift deployment. Uses the ServiceAccount as an OAuth
# client — no cluster-admin needed, no OAuthClient CR required.
#
# The post-install hook automatically:
#   1. Detects the Route hostname assigned by OpenShift
#   2. Annotates the ServiceAccount with the OAuth redirect URI
#   3. Patches the backend Secret with CORS origin, issuer, and callback URL
#   4. Restarts the backend to pick up the new values
#
# Usage:
#   oc new-project litemaas
#   helm install litemaas deployment/helm/litemaas/ \
#     -n litemaas \
#     -f deployment/helm/litemaas/values.openshift.example.yaml
# =============================================================================

global:
  platform: openshift

# -- OpenShift OAuth via ServiceAccount (default, no changes needed)
oauth:
  mode: serviceaccount
  authProvider: openshift

# -- Secrets — CHANGE ALL VALUES BELOW
postgresql:
  auth:
    password: "OPENSSL"
  persistence:
    # -- Storage size for the PostgreSQL PVC
    size: 10Gi
    # -- StorageClass name (empty = cluster default)
    storageClass: "ocs-storagecluster-ceph-rbd"
    # storageClass: "ocs-external-storagecluster-ceph-rbd"

litellm:
  auth:
    masterKey: "sk-OPENSSL"
    uiUsername: "admin"
    uiPassword: "PASSWORD"

backend:
  litellmApiUrl:  "https://litemaas-litellm-litemaas.${CLUSTER_URL}"
  auth:
    jwtSecret: "OPENSSL"
    adminApiKeys: "OPENSSL"
    litellmApiKey: "sk-OPENSSL"        # Must match litellm.auth.masterKey
    oauthClientId: "litemaas"
    oauthClientSecret: "123456abcdef"
    oauthIssuer: "https://oauth-openshift.${CLUSTER_URL}"
    oauthCallbackUrl: "https://litemaas-litemaas.${CLUSTER_URL}/api/auth/callback"
    # -- Backup & Restore configuration
  backup:
    # -- LiteLLM database URL. Auto-constructed when postgresql.enabled is true.
    # Used for: (1) model sync cross-referencing to prevent deleted models reappearing,
    # and (2) LiteLLM database backup/restore. Recommended for production deployments.
    litellmDatabaseUrl: ""
    # -- Mount path for backup storage inside the container.
    # This value is set as BACKUP_STORAGE_PATH env var.
    storagePath: "/data/backups"

    persistence:
      # -- Storage size for the backup PVC
      size: 5Gi
      # -- StorageClass name (empty = cluster default)
      storageClass: "ocs-storagecluster-ceph-rbd"
      # storageClass: "ocs-external-storagecluster-ceph-rbd"
  # -- Set to "0" to disable TLS verification (not recommended for production)
  nodeTlsRejectUnauthorized: "0"
    # On OpenShift, the deploying user is auto-detected as initial admin.
    # Set explicitly if you want specific users:
    # initialAdminUsers: "admin@example.com"

# -- Enable OpenShift Routes
route:
  enabled: true
  # Hostnames are auto-generated by OpenShift if empty.
  # Set explicitly to use custom hostnames:
  # frontend:
  #   host: litemaas.apps.cluster.example.com
  # litellm:
  #   host: litellm.apps.cluster.example.com
