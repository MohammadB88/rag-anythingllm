apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: gpu-operator-critical-rules
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  groups:
    - name: gpu-critical.rules
      rules:
        - alert: GPUMemoryCritical
          expr: DCGM_FI_DEV_FB_USED / (DCGM_FI_DEV_FB_USED + DCGM_FI_DEV_FB_FREE) > 0.95
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "GPU memory critical"
            description: "GPU memory usage is above 95% for more than 5 minutes."

        - alert: GPUTemperatureCritical
          expr: DCGM_FI_DEV_GPU_TEMP > 85
          for: 3m
          labels:
            severity: critical
          annotations:
            summary: "GPU temperature critical"
            description: "GPU temperature is above 85C for more than 3 minutes."

        - alert: GPUPowerCritical
          expr: DCGM_FI_DEV_POWER_USAGE / DCGM_FI_DEV_POWER_LIMIT > 0.95
          for: 3m
          labels:
            severity: critical
          annotations:
            summary: "GPU power critical"
            description: "GPU power draw is above 95% of the power limit for more than 3 minutes."

        - alert: GPUXIDErrorDetected
          expr: DCGM_FI_DEV_XID_ERRORS > 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "GPU XID error detected"
            description: "One or more GPU XID errors have been detected."

        - alert: GPUUnhealthy
          expr: DCGM_FI_DEV_GPU_TEMP < 0 or DCGM_FI_DEV_GPU_UTIL < 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "GPU metrics unavailable or unhealthy"
            description: "GPU metrics indicate an unhealthy or unavailable device."