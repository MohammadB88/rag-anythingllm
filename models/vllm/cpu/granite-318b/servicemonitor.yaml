apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: granite-3-1-8b-cpu-monitor
  namespace: llms-vllm   # replace with your app namespace
  labels:
    app: granite-3-1-8b-cpu
spec:
  selector:
    matchLabels:
      app: granite-3-1-8b-cpu
  namespaceSelector:
    matchNames:
    - llms-vllm           # same as metadata.namespace
  endpoints:
  - port: http                    # refers to the named port in your Service
    interval: 30s                 # or adjust as needed
    path: /v1/metrics                # or your app’s metrics endpoint, e.g. /v1/metrics
    scheme: http                  # or https if your app exposes TLS
