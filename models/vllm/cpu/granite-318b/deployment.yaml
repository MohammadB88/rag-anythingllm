---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: granite-3-1-8b-cpu
  labels:
    app: granite-3-1-8b-cpu
spec:
  replicas: 1
  selector:
    matchLabels:
      app: granite-3-1-8b-cpu
  template:
    metadata:
      labels:
        app: granite-3-1-8b-cpu
    spec:
      # ── Pull credentials for registry.redhat.io ──────────────────────────
      imagePullSecrets:
        - name: redhat-registry-secret   # `oc create secret docker-registry ...`

      # ── Init container: ModelCar → shared volume ─────────────────────────
      # KServe used to do this automatically. We replicate it manually.
      # The ModelCar image bundles weights under /model (OCI image convention).
      initContainers:
        - name: model-loader
          image: registry.redhat.io/rhelai1/modelcar-granite-3-1-8b-starter-v1:1.4
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              echo "Copying model weights to shared volume..."
              cp -r ./models/* /mnt/model/
              echo "Done. Contents:"
              ls /mnt/model/
          volumeMounts:
            - name: model-weights
              mountPath: /mnt/model

      containers:
        - name: vllm
          image: registry.redhat.io/rhaiis/vllm-cpu-rhel9:3.3.0
          imagePullPolicy: IfNotPresent

          # vLLM is launched directly — no KServe launcher wrapper here.
          command:
            - python
            - -m
            - vllm.entrypoints.openai.api_server
          args:
            - --model=/mnt/model
            - --served-model-name=ibm-granite/granite-3.1-8b-instruct
            - --max-model-len=4096
            - --port=8000
            # CPU KV-cache budget (matches VLLM_CPU_KVCACHE_SPACE=3 from original)
            # - --cpu-memory-utilization=0.85   # tune if needed; KVCACHE env ignored without launcher
          env:
            - name: VLLM_CPU_KVCACHE_SPACE
              value: "3"

          ports:
            - name: http
              containerPort: 8000
              protocol: TCP

          resources:
            requests:
              cpu: "3"
              memory: 16Gi
            limits:
              cpu: "6"
              memory: 24Gi

          volumeMounts:
            - name: model-weights
              mountPath: /mnt/model
              readOnly: true
          # ── Probes ────────────────────────────────────────────────────────
          # Switched to HTTP (not HTTPS) — TLS was terminated by the KServe
          # sidecar/gateway; plain vLLM serves HTTP by default.
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
              scheme: HTTP
            initialDelaySeconds: 300
            periodSeconds: 30
            timeoutSeconds: 30
            failureThreshold: 5

          readinessProbe:
            httpGet:
              path: /health
              port: 8000
              scheme: HTTP
            initialDelaySeconds: 300
            periodSeconds: 15
            timeoutSeconds: 15
            failureThreshold: 30

          # ── Startup probe — prevents liveness from killing a slow loader ──
          # Not needed with KServe (it managed readiness externally).
          # Here it gates liveness until vLLM is actually up.
          startupProbe:
            httpGet:
              path: /health
              port: 8000
              scheme: HTTP
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 10
            failureThreshold: 30   # 60 + (20×30) = up to 11 min to start

      volumes:
        - name: model-weights
          persistentVolumeClaim:
            claimName: granite-model-weights