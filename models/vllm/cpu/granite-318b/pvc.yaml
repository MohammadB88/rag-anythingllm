---
# storageClassName is replaced by env_preparation/deploy_root_application.sh during deployment.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: granite-model-weights
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi   # Granite 3.1 8B bf16 ≈ 16 GiB unpacked;
  storageClassName: placeholder-storageclass # leave headroom