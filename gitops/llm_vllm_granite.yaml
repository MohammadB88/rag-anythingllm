---
# argocd-apps/myapp.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: granite-3-1-8b-cpu
  namespace: openshift-gitops  # or your Argo CD namespace
spec:
  project: llms
  source:
    repoURL: https://github.com/MohammadB88/genai-application.git
    targetRevision: main
    path: models/vllm/cpu/granite-318b      # directory containing kustomization.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: llms-vllm             # target namespace for the app

  syncPolicy:
    automated:
      prune: true                # remove resources if deleted in Git
      selfHeal: true             # recreate if someone changes them
    syncOptions:
      - CreateNamespace=true   # automatically create the namespace if it doesn't exist